<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#0d0f1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0d0f1a;padding:40px 0;">
    <tr><td align="center">
      <table width="520" cellpadding="0" cellspacing="0" style="background:#13152b;border:1px solid rgba(99,102,241,0.18);border-radius:16px;overflow:hidden;">

        <!-- Header -->
        <tr>
          <td style="background:linear-gradient(135deg,#7c3aed,#4f46e5);padding:32px 40px;text-align:center;">
            <div style="display:inline-block;width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,0.15);line-height:48px;font-size:20px;font-weight:900;color:#fff;letter-spacing:-0.02em;">ST</div>
            <div style="margin-top:12px;font-size:20px;font-weight:800;color:#fff;letter-spacing:-0.02em;">Stay on Track</div>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:36px 40px;">
            <h1 style="margin:0 0 8px;font-size:22px;font-weight:800;color:#f0f0ff;">You've been added to a project</h1>
            <p style="margin:0 0 24px;font-size:15px;color:#a0a0c0;line-height:1.6;">
              <strong style="color:#c0c0e0;">{{ inviter_name }}</strong> has added you to
              <strong style="color:#c0c0e0;">{{ project_name }}</strong> on Stay on Track.
              You can now view and collaborate on tasks in this project.
            </p>

            <a href="{{ frontend_url }}/projects"
               style="display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;text-decoration:none;border-radius:10px;font-weight:700;font-size:14px;">
              Open project →
            </a>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding:20px 40px;border-top:1px solid rgba(99,102,241,0.12);">
            <p style="margin:0;font-size:12px;color:#50507a;text-align:center;">
              You're receiving this because you were added to a project on Stay on Track.
            </p>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
